<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Auto-Visio-Helper 功能宣传海报</title>
  <desc id="desc">横版海报，说明 Auto-Visio-Helper 的三项能力和四个亮点，以及从需求到可编辑 Visio 图的工作流程。</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .ink { fill: #1f2937; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .muted { fill: #5d6675; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .mono { fill: #2b3340; font-family: Consolas, "Microsoft YaHei", monospace; }
      .panel { fill: #ffffff; stroke: #d9e1ec; stroke-width: 2; rx: 20; }
      .capPanel { fill: #eef7ff; stroke: #b8d9f5; stroke-width: 2; rx: 20; }
      .hiPanel { fill: #fff7ec; stroke: #f2d19d; stroke-width: 2; rx: 20; }
      .flowPanel { fill: #f4f7fb; stroke: #d7e0eb; stroke-width: 2; rx: 22; }
      .card { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.6; rx: 16; }
      .capIcon { fill: #dbeafe; stroke: #6aa7d9; stroke-width: 2; rx: 14; }
      .hiIcon { fill: #ffedd5; stroke: #e8a146; stroke-width: 2; rx: 14; }
      .greenIcon { fill: #e5f6ea; stroke: #6baa78; stroke-width: 2; rx: 14; }
      .purpleIcon { fill: #efe7ff; stroke: #9d7edb; stroke-width: 2; rx: 14; }
      .flowBox { fill: #ffffff; stroke: #98a5b7; stroke-width: 2; rx: 16; }
      .flowAccent { fill: #e7f5ff; stroke: #65a9d8; stroke-width: 2; rx: 16; }
      .visioBox { fill: #eaf7ed; stroke: #66a974; stroke-width: 2; rx: 16; }
      .exportBox { fill: #fff0e2; stroke: #e19a45; stroke-width: 2; rx: 16; }
      .arrow { stroke: #667085; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
      .thin { stroke: #aab4c3; stroke-width: 2; fill: none; }
      .label { font-size: 22px; font-weight: 700; }
      .body { font-size: 22px; }
      .small { font-size: 18px; }
      .tiny { font-size: 15px; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <g filter="url(#softShadow)">
    <rect x="70" y="54" width="1460" height="116" rx="28" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
  </g>
  <text class="ink" x="110" y="106" font-size="42" font-weight="800">Auto-Visio-Helper</text>
  <text class="muted" x="112" y="144" font-size="24">把模糊科研绘图需求转成可检查、可复现、可编辑的 Microsoft Visio 图</text>
  <g transform="translate(1210 82)">
    <rect x="0" y="0" width="270" height="54" rx="16" fill="#1f2937"/>
    <text x="135" y="35" text-anchor="middle" fill="#ffffff" font-family="Consolas, 'Microsoft YaHei', monospace" font-size="20">JSON spec → VSDX</text>
  </g>

  <g transform="translate(70 210)" filter="url(#softShadow)">
    <rect class="capPanel" width="445" height="530"/>
    <text class="ink" x="32" y="52" font-size="30" font-weight="800">核心能力</text>
    <text class="muted" x="34" y="84" font-size="18">从需求理解到结构化复刻</text>

    <g transform="translate(28 120)">
      <rect class="card" width="389" height="112"/>
      <rect class="capIcon" x="20" y="24" width="66" height="64"/>
      <path d="M37 48 h33 M37 62 h26 M37 76 h21" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
      <text class="ink label" x="104" y="44">绘图方案整理</text>
      <text class="muted small" x="104" y="72">把模糊科研需求整理成</text>
      <text class="muted small" x="104" y="96">清晰、可检查的绘图方案</text>
    </g>

    <g transform="translate(28 252)">
      <rect class="card" width="389" height="112"/>
      <rect class="greenIcon" x="20" y="24" width="66" height="64"/>
      <rect x="38" y="35" width="30" height="18" rx="4" fill="#ffffff" stroke="#2f8b4c" stroke-width="2"/>
      <rect x="32" y="66" width="42" height="18" rx="4" fill="#ffffff" stroke="#2f8b4c" stroke-width="2"/>
      <path d="M53 53 v13" stroke="#2f8b4c" stroke-width="3" marker-end="url(#arrowHead)"/>
      <text class="ink label" x="104" y="44">自然语言生成图</text>
      <text class="muted small" x="104" y="72">模型结构图、方法流程图</text>
      <text class="muted small" x="104" y="96">系统架构图、实验流程图</text>
    </g>

    <g transform="translate(28 384)">
      <rect class="card" width="389" height="112"/>
      <rect class="purpleIcon" x="20" y="24" width="66" height="64"/>
      <path d="M33 73 L46 48 L59 63 L67 55 L76 73 Z" fill="#ffffff" stroke="#7c5cc4" stroke-width="2"/>
      <circle cx="42" cy="43" r="6" fill="#ffffff" stroke="#7c5cc4" stroke-width="2"/>
      <text class="ink label" x="104" y="44">参考图可编辑复现</text>
      <text class="muted small" x="104" y="72">论文截图、手绘草图、PPT 截图</text>
      <text class="muted small" x="104" y="96">在 Visio 中重建为可编辑图形</text>
    </g>
  </g>

  <g transform="translate(555 210)" filter="url(#softShadow)">
    <rect class="flowPanel" width="490" height="530"/>
    <text class="ink" x="32" y="52" font-size="30" font-weight="800">工作流</text>
    <text class="muted" x="34" y="84" font-size="18">先规划，再渲染，最后导出预览</text>

    <g transform="translate(44 122)">
      <rect class="flowBox" x="0" y="0" width="180" height="78"/>
      <text class="ink label" x="90" y="34" text-anchor="middle">用户输入</text>
      <text class="muted tiny" x="90" y="58" text-anchor="middle">自然语言 / 参考图片</text>

      <path class="arrow" d="M190 39 H260"/>

      <rect class="flowAccent" x="272" y="0" width="180" height="78"/>
      <text class="ink label" x="362" y="34" text-anchor="middle">绘图规格</text>
      <text class="mono tiny" x="362" y="58" text-anchor="middle">drawing_spec.json</text>
    </g>

    <path class="arrow" d="M800 330 C800 370 800 382 800 408"/>

    <g transform="translate(44 238)">
      <rect class="visioBox" x="0" y="0" width="180" height="78"/>
      <text class="ink label" x="90" y="34" text-anchor="middle">Visio COM</text>
      <text class="muted tiny" x="90" y="58" text-anchor="middle">自动放置形状与连线</text>

      <path class="arrow" d="M190 39 H260"/>

      <rect class="exportBox" x="272" y="0" width="180" height="78"/>
      <text class="ink label" x="362" y="34" text-anchor="middle">可编辑输出</text>
      <text class="mono tiny" x="362" y="58" text-anchor="middle">.vsdx + .png</text>
    </g>

    <g transform="translate(50 390)">
      <rect x="0" y="0" width="400" height="78" rx="18" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
      <text class="ink" x="24" y="34" font-size="21" font-weight="700">核心原则</text>
      <text class="muted small" x="24" y="60">不粘贴整张截图，而是重建 Visio 原生图元</text>
    </g>
  </g>

  <g transform="translate(1085 210)" filter="url(#softShadow)">
    <rect class="hiPanel" width="445" height="530"/>
    <text class="ink" x="32" y="52" font-size="30" font-weight="800">实现亮点</text>
    <text class="muted" x="34" y="84" font-size="18">让图可确认、可编辑、可导出、可复用</text>

    <g transform="translate(28 116)">
      <rect class="card" width="389" height="86"/>
      <rect class="hiIcon" x="20" y="18" width="54" height="50"/>
      <text class="mono" x="47" y="49" text-anchor="middle" font-size="18">{ }</text>
      <text class="ink label" x="94" y="36">先生成 JSON drawing spec</text>
      <text class="muted small" x="94" y="64">用户确认后再调用 Visio 绘图</text>
    </g>

    <g transform="translate(28 218)">
      <rect class="card" width="389" height="86"/>
      <rect class="greenIcon" x="20" y="18" width="54" height="50"/>
      <rect x="33" y="29" width="28" height="18" rx="3" fill="#ffffff" stroke="#2f8b4c" stroke-width="2"/>
      <path d="M47 47 v10" stroke="#2f8b4c" stroke-width="3"/>
      <text class="ink label" x="94" y="36">真正可编辑的 Visio 元素</text>
      <text class="muted small" x="94" y="64">形状、连接线、文本框、图层、命名对象</text>
    </g>

    <g transform="translate(28 320)">
      <rect class="card" width="389" height="86"/>
      <rect class="capIcon" x="20" y="18" width="54" height="50"/>
      <path d="M35 30 h24 v28 h-24 z" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <path d="M39 50 h16 M39 56 h12" stroke="#2563eb" stroke-width="2"/>
      <text class="ink label" x="94" y="36">预览与多格式导出</text>
      <text class="muted small" x="94" y="64">支持 .png，预留 .pdf / .svg 导出能力</text>
    </g>

    <g transform="translate(28 422)">
      <rect class="card" width="389" height="86"/>
      <rect class="purpleIcon" x="20" y="18" width="54" height="50"/>
      <path d="M34 50 C44 30 56 30 64 48" class="thin"/>
      <path d="M34 57 h30" stroke="#7c5cc4" stroke-width="3" stroke-linecap="round"/>
      <text class="ink label" x="94" y="36">内置科研绘图参考</text>
      <text class="muted small" x="94" y="64">论文风格、布局模式、Visio 自动化文档</text>
    </g>
  </g>

  <g transform="translate(96 792)">
    <rect x="0" y="0" width="1408" height="56" rx="18" fill="#1f2937"/>
    <text x="704" y="36" text-anchor="middle" fill="#ffffff" font-family="Consolas, 'Microsoft YaHei', monospace" font-size="21">
      vague request / reference image → reviewable JSON spec → Visio COM automation → editable VSDX + preview exports
    </text>
  </g>
</svg>
